name: Daily Bias Pipeline

on:
  schedule:
    - cron: '0 11 * * *'  # 06:00 AM EST = 11:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub UI (Actions tab → Run workflow)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run bias pipeline
        run: node pipeline/run.js
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY:        ${{ secrets.NEWSAPI_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Report success
        if: success()
        run: echo "✅ Pipeline completed successfully"

      - name: Report failure
        if: failure()
        run: echo "❌ Pipeline failed — check logs above"
