name: Daily Bias Pipeline

on:
  schedule:
    - cron: '0 10 * * *'   # 06:00 AM EDT (UTC-4, summer) = 10:00 UTC  [primary]
    - cron: '0 15 * * *'   # 11:00 AM EDT = 15:00 UTC                  [backup if primary missed]
  workflow_dispatch:         # Manual trigger from GitHub UI (Actions tab → Run workflow)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write        # needed to commit latest.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run bias pipeline
        run: node pipeline/run.js
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          XAI_API_KEY:          ${{ secrets.XAI_API_KEY }}
          X_API_KEY:            ${{ secrets.X_API_KEY }}
          X_API_SECRET:         ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:       ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:      ${{ secrets.X_ACCESS_SECRET }}

      - name: Commit latest data file
        continue-on-error: true   # latest.json is a demo fallback only; Supabase is the real store
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --staged --quiet || git commit -m "chore: daily bias data $(date +%Y-%m-%d) [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin master
            if git push; then
              echo "✓ Pushed on attempt $i"
              break
            fi
            echo "Attempt $i failed — retrying in 5s..."
            sleep 5
          done

      - name: Ping healthcheck
        if: success()
        continue-on-error: true   # never fail the job if the ping fails
        run: |
          if [ -n "${{ secrets.HEALTHCHECK_PING_URL }}" ]; then
            curl -fsS --retry 3 "${{ secrets.HEALTHCHECK_PING_URL }}" > /dev/null
            echo "✅ Healthcheck pinged"
          else
            echo "ℹ HEALTHCHECK_PING_URL not set — skipping ping"
          fi

      - name: Trigger Neutral News pipeline
        if: success()
        continue-on-error: true   # never fail this job if the downstream trigger fails
        run: |
          if [ -n "${{ secrets.NEUTRAL_NEWS_TRIGGER_TOKEN }}" ]; then
            curl -fsS -X POST \
              -H "Authorization: Bearer ${{ secrets.NEUTRAL_NEWS_TRIGGER_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/varleypi/neutral-news/dispatches \
              -d '{"event_type":"spindetector-updated"}'
            echo "✅ Triggered Neutral News pipeline"
          else
            echo "ℹ NEUTRAL_NEWS_TRIGGER_TOKEN not set — skipping downstream trigger"
          fi

      - name: Report success
        if: success()
        run: echo "✅ Pipeline completed successfully"

      - name: Report failure
        if: failure()
        run: echo "❌ Pipeline failed — check logs above"
