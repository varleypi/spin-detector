name: Daily Bias Pipeline

on:
  schedule:
    - cron: '0 10 * * *'   # 06:00 AM EDT (UTC-4, summer) = 10:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub UI (Actions tab → Run workflow)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write        # needed to commit latest.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run bias pipeline
        run: node pipeline/run.js
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          XAI_API_KEY:          ${{ secrets.XAI_API_KEY }}

      - name: Commit latest data file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --staged --quiet || git commit -m "chore: daily bias data $(date +%Y-%m-%d) [skip ci]"
          git push

      - name: Report success
        if: success()
        run: echo "✅ Pipeline completed successfully"

      - name: Report failure
        if: failure()
        run: echo "❌ Pipeline failed — check logs above"
