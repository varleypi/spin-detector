<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded tile matching the site theme -->
  <rect x="0" y="0" width="100" height="100" rx="24" fill="#0b1120"/>
  <rect x="1.5" y="1.5" width="97" height="97" rx="22.5" fill="none" stroke="#1e293b" stroke-width="3"/>
  <!-- Bias-spectrum gauge arc (blue left → red right) -->
  <path d="M 22 62 A 28 28 0 0 1 78 62" fill="none" stroke="url(#spectrum)" stroke-width="11" stroke-linecap="round"/>
  <!-- Needle pointing to center (neutral) -->
  <line x1="50" y1="62" x2="50" y2="33" stroke="#f8fafc" stroke-width="6" stroke-linecap="round"/>
  <circle cx="50" cy="62" r="6.5" fill="#f8fafc"/>
</svg>
